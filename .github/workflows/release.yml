name: Release Build

on:
  push:
    tags:
      - 'v*'

# Allow the workflow to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 — NSIS installer (.exe)
          - platform: windows-latest
            args: '--bundles nsis'
            rust_targets: ''
            name: Windows x64

          # macOS Apple Silicon — DMG (.dmg aarch64)
          - platform: macos-15
            args: '--target aarch64-apple-darwin --bundles dmg'
            rust_targets: 'aarch64-apple-darwin'
            name: macOS Apple Silicon

          # macOS Intel — DMG (.dmg x86_64)，在 Apple Silicon runner 上交叉编译
          - platform: macos-15
            args: '--target x86_64-apple-darwin --bundles dmg'
            rust_targets: 'x86_64-apple-darwin'
            name: macOS Intel

          # Linux x64 — AppImage + deb
          - platform: ubuntu-22.04
            args: '--bundles appimage,deb'
            rust_targets: ''
            name: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Linux only: install webkit2gtk and other required system libraries
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skylark ${{ github.ref_name }}'
          releaseBody: |
            ## 下载安装包

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `*-x64-setup.exe` |
            | macOS Apple Silicon | `*_aarch64.dmg` |
            | macOS Intel | `*_x64.dmg` |
            | Linux (AppImage) | `*.AppImage` |
            | Linux (Debian/Ubuntu) | `*.deb` |

            > **注意**：首次运行需要自行下载 [sing-box 内核](https://github.com/SagerNet/sing-box/releases/latest)。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
